<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — LPG Point</title>
<link rel="stylesheet" href="assets/css/style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);}
.login-wrap{width:100%;max-width:380px;padding:20px;}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:36px 32px;}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo .ico{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,var(--accent),#c2410c);display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:12px;}
.login-logo h1{font-size:22px;font-weight:800;color:var(--white);}
.login-logo p{font-size:12px;color:var(--muted);margin-top:3px;}
.eye-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;}
.pass-wrap{position:relative;}
.pass-wrap .fc{padding-right:36px;}
.login-footer{text-align:center;margin-top:20px;font-size:11px;color:var(--muted);}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <div class="ico">🔥</div>
      <h1>LPG Point</h1>
      <p>Gas Cylinder Shop POS</p>
    </div>
    <div class="fg">
      <label class="fl">Username</label>
      <input class="fc" id="uname" type="text" placeholder="Apna username daalen" autocomplete="off">
    </div>
    <div class="fg">
      <label class="fl">Password</label>
      <div class="pass-wrap">
        <input class="fc" id="upass" type="password" placeholder="Password likhein" onkeydown="if(event.key==='Enter')doLogin()">
        <button class="eye-btn" onclick="togglePass()"><i class="bi bi-eye" id="eye-icon"></i></button>
      </div>
    </div>
    <div id="err-msg" style="display:none;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:9px 12px;font-size:12px;color:var(--danger);margin-bottom:12px;">
      ❌ Username ya password galat hai!
    </div>
    <button class="btn btn-primary w100" style="margin-top:4px;" onclick="doLogin()"><i class="bi bi-box-arrow-in-right"></i> Login Karein</button>
    <div class="login-footer">
      Demo: owner1 / 1234 &nbsp;|&nbsp; owner2 / 5678
    </div>
  </div>
</div>
<script src="assets/js/main.js"></script>
<script>
// If already logged in
if(getSession()) window.location.href='index.html';
function togglePass(){
  const p=document.getElementById('upass');
  const e=document.getElementById('eye-icon');
  p.type=p.type==='password'?'text':'password';
  e.className=p.type==='password'?'bi bi-eye':'bi bi-eye-slash';
}
function doLogin(){
  const u=document.getElementById('uname').value.trim();
  const p=document.getElementById('upass').value;
  const err=document.getElementById('err-msg');
  const user=USERS[u];
  if(user && user.password===p){
    setSession({id:user.id,name:user.name,role:user.role,username:u});
    window.location.href='index.html';
  } else {
    err.style.display='block';
    document.getElementById('upass').value='';
  }
}
</script>
</body>
</html>
